<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Data Engineer - BrightWave | Jobvite</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 24px; background: #fff; }
    h1 { color: #1a1a1a; margin: 0 0 4px; }
    .company { color: #555; margin-bottom: 24px; }
    label { display: block; margin-top: 14px; font-weight: 600; font-size: 13px; color: #222; }
    input, textarea, select { width: 100%; padding: 8px 10px; margin-top: 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 14px; box-sizing: border-box; }
    textarea { height: 110px; }
    .radio-group { margin-top: 8px; }
    .radio-group label { display: inline; font-weight: normal; margin-right: 18px; }
    .radio-group input[type="radio"] { width: auto; margin-right: 4px; }
    button { margin-top: 24px; padding: 10px 28px; background: #d32f2f; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 15px; font-weight: 600; }
    .jv-section { margin-top: 24px; padding-top: 18px; border-top: 1px solid #e8e8e8; }
    .jv-section h2 { font-size: 15px; color: #1a1a1a; margin: 0 0 4px; }
    fieldset { border: none; padding: 0; margin: 0; }
    legend { font-weight: 600; font-size: 13px; color: #222; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="jv-wrapper">
    <h2 class="jv-job-detail-title">Data Engineer</h2>
    <p class="company">BrightWave · New York, NY</p>
    <p>Join our data platform team.</p>

    <form class="jv-application-form" action="#" method="POST">
      <div class="jv-section">
        <h2>Candidate Information</h2>

        <label for="first_name">First Name *</label>
        <input type="text" id="first_name" name="first_name" required />

        <label for="last_name">Last Name *</label>
        <input type="text" id="last_name" name="last_name" required />

        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required />

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" />
      </div>

      <div class="jv-section">
        <h2>Address</h2>

        <label for="address">Street Address</label>
        <input type="text" id="address" name="address" />

        <label for="city">City</label>
        <input type="text" id="city" name="city" />

        <label for="state">State / Region</label>
        <input type="text" id="state" name="state" />

        <label for="zip">ZIP / Postal Code</label>
        <input type="text" id="zip" name="zip" />

        <label for="country">Country</label>
        <select id="country" name="country">
          <option value="">Select country</option>
          <option value="United States">United States</option>
          <option value="India">India</option>
          <option value="Canada">Canada</option>
          <option value="United Kingdom">United Kingdom</option>
        </select>
      </div>

      <div class="jv-section">
        <h2>Links</h2>

        <label for="linkedin_url">LinkedIn Profile</label>
        <input type="url" id="linkedin_url" name="linkedin_url" placeholder="https://linkedin.com/in/..." />

        <label for="website">Portfolio / Website</label>
        <input type="url" id="website" name="website" />

        <label for="current_company">Current Employer</label>
        <input type="text" id="current_company" name="current_company" />

        <label for="current_title">Current Job Title</label>
        <input type="text" id="current_title" name="current_title" />
      </div>

      <div class="jv-section">
        <h2>Resume</h2>
        <label for="resume">Upload Resume *</label>
        <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" />
      </div>

      <div class="jv-section">
        <h2>Additional Questions</h2>

        <fieldset>
          <legend>Are you authorized to work in the United States? *</legend>
          <div class="radio-group">
            <label><input type="radio" name="work_auth" value="Yes" /> Yes</label>
            <label><input type="radio" name="work_auth" value="No" /> No</label>
          </div>
        </fieldset>

        <fieldset style="margin-top: 14px">
          <legend>Will you now or in the future require sponsorship? *</legend>
          <div class="radio-group">
            <label><input type="radio" name="sponsor" value="Yes" /> Yes</label>
            <label><input type="radio" name="sponsor" value="No" /> No</label>
          </div>
        </fieldset>

        <label for="why_brightwave">Why are you interested in BrightWave?</label>
        <textarea id="why_brightwave" name="why_brightwave"></textarea>

        <label for="how_heard">How did you hear about us?</label>
        <select id="how_heard" name="how_heard">
          <option value="">Select...</option>
          <option>LinkedIn</option>
          <option>Indeed</option>
          <option>Employee Referral</option>
          <option>Company Website</option>
          <option>Other</option>
        </select>
      </div>

      <button type="submit">Submit Application</button>
    </form>
  </div>

  <script>
    document.querySelector('form').addEventListener('submit', e => {
      e.preventDefault();
      document.title = 'Application Submitted - BrightWave';
      document.body.innerHTML = '<h1>Thank you!</h1><p>Your application has been received.</p>';
    });
  </script>
</body>
</html>
