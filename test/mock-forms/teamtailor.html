<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Backend Engineer - Oneflow | Careers</title>
  <!-- Detector signal: Teamtailor meta generator tag -->
  <meta name="generator" content="Teamtailor" />
  <style>
    body { font-family: Inter, system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 24px; background: #fff; }
    h1 { color: #0f172a; margin: 0 0 4px; }
    .company { color: #64748b; margin-bottom: 24px; }
    label { display: block; margin-top: 14px; font-weight: 600; font-size: 13px; color: #1e293b; }
    input, textarea, select { width: 100%; padding: 10px 12px; margin-top: 4px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    textarea { height: 110px; }
    .radio-group { margin-top: 8px; }
    .radio-group label { display: inline; font-weight: normal; margin-right: 18px; }
    .radio-group input[type="radio"] { width: auto; margin-right: 4px; }
    button { margin-top: 24px; padding: 12px 28px; background: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; }
    .section { margin-top: 24px; padding-top: 18px; border-top: 1px solid #f1f5f9; }
    .section h2 { font-size: 15px; color: #0f172a; margin: 0 0 4px; }
    fieldset { border: none; padding: 0; margin: 0; }
    legend { font-weight: 600; font-size: 13px; color: #1e293b; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1 class="JobTitle">Backend Engineer</h1>
  <p class="company">Oneflow · Stockholm, Sweden · Remote Friendly</p>
  <p>We're looking for a backend engineer who loves clean APIs and Postgres.</p>

  <form action="/applications" method="POST">
    <div class="section">
      <h2>Personal Details</h2>

      <label for="ja-firstname">First name *</label>
      <input type="text" id="ja-firstname" name="job_application[first_name]" required />

      <label for="ja-lastname">Last name *</label>
      <input type="text" id="ja-lastname" name="job_application[last_name]" required />

      <label for="ja-email">Email *</label>
      <input type="email" id="ja-email" name="job_application[email]" required />

      <label for="ja-phone">Phone</label>
      <input type="tel" id="ja-phone" name="job_application[phone]" />

      <label for="ja-location">Location</label>
      <input type="text" id="ja-location" name="job_application[location]" placeholder="City" />
    </div>

    <div class="section">
      <h2>Links</h2>

      <label for="ja-linkedin">LinkedIn profile</label>
      <input type="url" id="ja-linkedin" name="job_application[linkedin_profile]" placeholder="linkedin.com/in/..." />

      <label for="ja-website">Personal website</label>
      <input type="url" id="ja-website" name="job_application[website]" />
    </div>

    <div class="section">
      <h2>Resume</h2>
      <label for="ja-cv">Upload CV (PDF) *</label>
      <input type="file" id="ja-cv" name="job_application[cv]" accept=".pdf,.doc,.docx" />
    </div>

    <div class="section">
      <h2>A few questions</h2>

      <fieldset>
        <legend>Are you legally allowed to work in Sweden? *</legend>
        <div class="radio-group">
          <label><input type="radio" name="q_work_auth" value="Yes" /> Yes</label>
          <label><input type="radio" name="q_work_auth" value="No" /> No</label>
        </div>
      </fieldset>

      <label for="q_motivation">Why Oneflow?</label>
      <textarea id="q_motivation" name="job_application[question_motivation]" placeholder="Tell us why..."></textarea>

      <label for="q_project">Tell us about a project you're proud of.</label>
      <textarea id="q_project" name="job_application[question_project]"></textarea>

      <label for="q_how_heard">How did you hear about us?</label>
      <select id="q_how_heard" name="job_application[question_source]">
        <option value="">Select...</option>
        <option>LinkedIn</option>
        <option>Welcome to the Jungle</option>
        <option>Friend / Colleague</option>
        <option>Company website</option>
      </select>
    </div>

    <button type="submit">Submit application</button>
  </form>

  <script>
    document.querySelector('form').addEventListener('submit', e => {
      e.preventDefault();
      document.title = 'Thank you for applying - Oneflow';
      document.body.innerHTML = '<h1>Application received!</h1><p>We\'ll be in touch soon.</p>';
    });
  </script>
</body>
</html>
